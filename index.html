<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFL Buddy Market Calculator</title>
  <!-- Google Font for a fun game look -->
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pixel: ['"VT323"', 'monospace'],
            game: ['"Fredoka"', 'sans-serif'],
          },
          colors: {
            sfl: {
              green: '#3e8914',
              dirt: '#2b1e17',
              wood: '#633d1f',
              woodLight: '#8a5832',
              card: '#fff3db',
              cardBorder: '#c49a6c',
              gold: '#f2a900',
              accent: '#e76f51'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #2e531c;
      /* Subtle pixel grass pattern */
      background-image: radial-gradient(#3a6923 15%, transparent 16%), radial-gradient(#3a6923 15%, transparent 16%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
    }
    .sfl-panel {
      background-color: #fceade;
      border: 4px solid #5c3317;
      box-shadow: inset -4px -4px 0px #d4a373, 0px 8px 0px #1a0f07;
    }
    .sfl-input {
      background-color: #ffffff;
      border: 3px solid #8a5832;
      box-shadow: inset 2px 2px 0px #d9d9d9;
    }
    .sfl-btn {
      background-color: #e76f51;
      border: 3px solid #4a1e05;
      box-shadow: 0px 4px 0px #311302;
    }
    .sfl-btn:active {
      transform: translateY(2px);
      box-shadow: 0px 2px 0px #311302;
    }
  </style>
</head>
<body class="font-game text-sfl-dirt min-h-screen p-4 sm:p-8 flex items-center justify-center">

  <div class="w-full max-w-xl sfl-panel rounded-2xl p-6 sm:p-8 relative">
    
    <!-- Top Header Ribbon -->
    <div class="text-center mb-6">
      <div class="inline-block bg-sfl-wood text-amber-200 border-2 border-sfl-dirt px-6 py-1 rounded-full shadow-md">
        <h1 class="text-2xl sm:text-3xl font-pixel tracking-wider font-bold text-amber-300 flex items-center gap-2 justify-center">
          <span>🌻</span> SFL BUDDY CALCULATOR
        </h1>
      </div>
      <p class="text-xs font-semibold text-sfl-woodLight mt-2">Live item prices via sfl.world proxy</p>
    </div>

    <!-- Inputs Section -->
    <div class="space-y-4 bg-sfl-card/80 p-4 rounded-xl border-2 border-sfl-cardBorder">
      
      <!-- Search Input -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-sfl-wood mb-1">🔍 Search Items</label>
        <input type="text" id="search" placeholder="Type to filter (e.g., Gold, Sunflower)..." 
          class="w-full sfl-input rounded-lg px-3 py-2 text-sm text-sfl-dirt focus:outline-none focus:ring-2 focus:ring-sfl-gold">
      </div>

      <!-- Item Select Dropdown -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-sfl-wood mb-1">📦 Select Item</label>
        <select id="item-select" class="w-full sfl-input rounded-lg px-3 py-2 text-sm text-sfl-dirt focus:outline-none focus:ring-2 focus:ring-sfl-gold">
          <option>Loading live prices...</option>
        </select>
      </div>

      <!-- Quantity Input -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-sfl-wood mb-1">🔢 Quantity</label>
        <input type="number" id="quantity" value="1" min="1" 
          class="w-full sfl-input rounded-lg px-3 py-2 text-sm text-sfl-dirt focus:outline-none focus:ring-2 focus:ring-sfl-gold">
      </div>

      <!-- Add Button -->
      <button id="add-btn" 
        class="w-full sfl-btn text-white font-bold py-2.5 rounded-xl transition text-base tracking-wide flex items-center justify-center gap-2">
        <span>🧺</span> Add to Farm Basket
      </button>
    </div>

    <!-- Basket Table -->
    <div class="mt-6 bg-white/70 border-2 border-sfl-cardBorder rounded-xl overflow-hidden">
      <table class="w-full text-left text-sm text-sfl-dirt">
        <thead class="text-xs uppercase bg-sfl-wood text-amber-200 border-b-2 border-sfl-dirt">
          <tr>
            <th class="px-4 py-2.5">Item</th>
            <th class="px-4 py-2.5">Qty</th>
            <th class="px-4 py-2.5">Subtotal</th>
            <th class="px-4 py-2.5 text-right">Action</th>
          </tr>
        </thead>
        <tbody id="basket-body" class="divide-y divide-sfl-cardBorder/50 font-medium">
          <tr>
            <td colspan="4" class="px-4 py-6 text-center text-sfl-woodLight italic">
              Your farm basket is empty!
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Total Display Banner -->
    <div class="mt-6 bg-sfl-gold/20 border-2 border-sfl-gold rounded-xl p-4 text-center shadow-inner">
      <span class="text-xs font-bold uppercase tracking-widest text-sfl-wood">Total SFL Value</span>
      <h2 id="total-sfl" class="text-3xl font-pixel font-bold text-sfl-wood mt-0.5">0.0000 SFL</h2>
    </div>

  </div>

  <script>
    let allPrices = {};
    let basket = [];

    fetch('/api/get-data')
      .then(res => res.json())
      .then(rawData => {
        allPrices = extractPrices(rawData);
        renderDropdown();
      });

    function extractPrices(data) {
      let pricesMap = {};
      function searchObj(obj, category = '') {
        for (let key in obj) {
          let val = obj[key];
          if (typeof val === 'number') {
            pricesMap[category + key] = val;
          } else if (val && typeof val === 'object') {
            let p = val.price || val.sfl || val.sflPrice;
            if (p !== undefined) pricesMap[category + key] = parseFloat(p);
            else searchObj(val, key.length <= 4 ? `[${key.toUpperCase()}] ` : '');
          }
        }
      }
      searchObj(data);
      return pricesMap;
    }

    function renderDropdown() {
      const select = document.getElementById('item-select');
      const searchTerm = document.getElementById('search').value.toLowerCase();
      select.innerHTML = '';

      const filteredKeys = Object.keys(allPrices)
        .filter(key => key.toLowerCase().includes(searchTerm))
        .sort();

      if (filteredKeys.length === 0) {
        select.innerHTML = '<option>No matching items</option>';
        return;
      }

      filteredKeys.forEach(item => {
        let opt = document.createElement('option');
        opt.value = item;
        opt.textContent = `${item} — (${allPrices[item]} SFL)`;
        select.appendChild(opt);
      });
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      const item = document.getElementById('item-select').value;
      const qty = parseFloat(document.getElementById('quantity').value) || 0;

      if (!item || allPrices[item] === undefined || qty <= 0) return;

      const unitPrice = allPrices[item];
      const subtotal = unitPrice * qty;

      basket.push({ item, qty, unitPrice, subtotal });
      updateBasketTable();
    });

    function updateBasketTable() {
      const tbody = document.getElementById('basket-body');
      tbody.innerHTML = '';

      let grandTotal = 0;

      if (basket.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-6 text-center text-sfl-woodLight italic">Your farm basket is empty!</td></tr>';
      } else {
        basket.forEach((entry, index) => {
          grandTotal += entry.subtotal;
          let tr = document.createElement('tr');
          tr.className = "hover:bg-amber-50/50 transition";
          tr.innerHTML = `
            <td class="px-4 py-2.5 font-bold text-sfl-dirt">${entry.item}</td>
            <td class="px-4 py-2.5">${entry.qty}</td>
            <td class="px-4 py-2.5 text-sfl-green font-bold">${entry.subtotal.toFixed(4)} SFL</td>
            <td class="px-4 py-2.5 text-right">
              <button onclick="removeItem(${index})" class="text-sfl-accent hover:text-red-700 font-bold px-2">✕</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('total-sfl').textContent = `${grandTotal.toFixed(4)} SFL`;
    }

    function removeItem(index) {
      basket.splice(index, 1);
      updateBasketTable();
    }

    document.getElementById('search').addEventListener('input', renderDropdown);
  </script>

</body>
</html>
